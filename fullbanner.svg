<svg width="100%" viewBox="0 0 860 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="orb1" cx="20%" cy="40%">
      <stop offset="0%" style="stop-color:#7850ff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="60%">
      <stop offset="0%" style="stop-color:#00c8c8;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ff6496;stop-opacity:0.13"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="rgba(255,255,255,0.045)"/>
    </pattern>
  </defs>

  <!-- Full background -->
  <rect width="860" height="120" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <ellipse cx="160" cy="60" rx="220" ry="90" fill="url(#orb1)"/>
  <ellipse cx="700" cy="60" rx="200" ry="80" fill="url(#orb2)"/>
  <ellipse cx="430" cy="60" rx="180" ry="70" fill="url(#orb3)"/>

  <!-- Dot grid overlay -->
  <rect width="860" height="120" fill="url(#dots)"/>

  <!-- Cursive name -->
  <text
    x="430" y="72"
    text-anchor="middle"
    font-family="'Dancing Script', 'Brush Script MT', 'Segoe Script', cursive"
    font-size="62"
    font-weight="700"
    fill="url(#textGrad)"
    filter="url(#glow)"
    letter-spacing="2"
  >Ayush Das</text>

  <!-- Underline accent -->
  <line x1="240" y1="86" x2="620" y2="86" stroke="url(#textGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
